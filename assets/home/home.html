<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanadium Home</title>

    <link rel="stylesheet" href="home.css">
</head>

<body>

    <div class="container">

        <h1>Vanadium</h1>

        <p class="subtitle">
            Fast. Simple. Yours.
        </p>

        <input
            id="searchBox"
            type="text"
            placeholder="Search the web or enter a website..."
        >

        <div class="quick-links">

            <button id="github">
                GitHub
            </button>

            <button id="youtube">
                YouTube
            </button>

            <button id="gmail">
                Gmail
            </button>

            <button id="wikipedia">
                Wikipedia
            </button>

        </div>

    </div>

    <script src="home.js"></script>

</body>
</html>
